<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>✦ Exercise</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@media all and (display-mode:standalone){
  .main{padding-top:calc(env(safe-area-inset-top) + 28px)!important;}
}
:root{
  --bg:#0d0b12;--bg2:#13101a;--bg3:#1a1622;--bg4:#221d2e;
  --border:rgba(244,184,212,0.08);--border2:rgba(244,184,212,0.16);--border3:rgba(244,184,212,0.28);
  --text:#f5f0ff;--text2:#9890a8;--text3:#5a5268;
  --pink:#f4b8d4;--lavender:#c8a8f0;--peach:#f8d0a0;--sky:#a8d8f0;--rose:#f09898;--mint:#b8f0d8;
  --pink-dim:rgba(244,184,212,0.12);--lavender-dim:rgba(200,168,240,0.12);
  --peach-dim:rgba(248,208,160,0.12);--mint-dim:rgba(184,240,216,0.12);
  --r:14px;--r-sm:10px;--r-lg:20px;--nav-h:72px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;line-height:1.6;overscroll-behavior:none;-webkit-text-size-adjust:100%;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:var(--pink);animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);}
@keyframes twinkle{0%,100%{opacity:0.08;transform:scale(1);}50%{opacity:0.45;transform:scale(1.4);}}
.app{position:relative;z-index:1;display:flex;height:100vh;}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:calc(env(safe-area-inset-top,20px) + 28px) 20px calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 20px);-webkit-overflow-scrolling:touch;}
@media(min-width:700px){.main{padding:32px 32px 32px;}}
.bottom-nav{display:flex;flex-direction:column;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:100;}
.bn-row{display:flex;height:var(--nav-h);}
.bn-row::after{content:'';display:block;height:env(safe-area-inset-bottom,0px);}
.bottom-nav::after{content:'';display:block;height:env(safe-area-inset-bottom,0px);background:var(--bg2);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);transition:color 0.18s;border:none;background:none;font-family:'Nunito',sans-serif;padding:8px 4px;}
.bn-item.active{color:var(--pink);}
.bn-icon{width:22px;height:22px;}
.bn-label{font-size:9px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
@media(min-width:700px){.bottom-nav{display:none;}}
.page{display:none;}.page.active{display:block;}
.page-header{margin-bottom:24px;}
.page-title{font-family:'Playfair Display',serif;font-size:28px;color:var(--text);line-height:1.2;}
.page-title em{font-style:italic;color:var(--pink);}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.card+.card{margin-top:14px;}
.card-title{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}
.stat-grid{display:grid;gap:10px;margin-bottom:16px;}
.stat-grid.cols-2{grid-template-columns:1fr 1fr;}
.stat{background:var(--bg3);border-radius:var(--r-sm);padding:14px;}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;line-height:1;}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;}
.stat-sub{font-size:10px;color:var(--text3);margin-top:1px;}
.today-banner{background:linear-gradient(135deg,rgba(244,184,212,0.1),rgba(200,168,240,0.08));border:1px solid var(--border2);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:18px;position:relative;overflow:hidden;}
.today-banner::before{content:'✦';position:absolute;right:16px;top:12px;font-size:22px;color:var(--pink);opacity:0.25;}
.today-banner::after{content:'✧';position:absolute;right:36px;bottom:10px;font-size:14px;color:var(--lavender);opacity:0.3;}
.banner-day{font-family:'Playfair Display',serif;font-size:22px;color:var(--pink);}
.banner-type{font-size:13px;color:var(--text2);margin-top:2px;}
.banner-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:9px 18px;background:var(--pink);color:#1a0010;border-radius:99px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity 0.15s;}
.banner-btn:hover{opacity:0.88;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
.day-name{font-size:9px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;font-weight:600;}
.day-circle{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);transition:all 0.18s;position:relative;}
.day-circle.done{background:var(--pink);border-color:var(--pink);color:#1a0010;}
.day-circle.today{border-color:var(--lavender);color:var(--lavender);}
.day-circle.today.done{background:var(--pink);border-color:var(--pink);color:#1a0010;}
.day-circle.future{opacity:0.25;}
.day-dot{width:5px;height:5px;border-radius:50%;background:var(--lavender);}
.day-tag{font-size:8px;color:var(--text3);text-align:center;max-width:38px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-list{list-style:none;}
.ex-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.ex-item:last-child{border-bottom:none;padding-bottom:0;}
.ex-item:first-child{padding-top:0;}
.ex-check{width:20px;height:20px;border-radius:6px;border:1px solid var(--border3);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;}
.ex-check.checked{background:var(--pink);border-color:var(--pink);}
.ex-check.checked::after{content:'✓';font-size:11px;color:#1a0010;font-weight:800;}
.ex-check.readonly{cursor:default;border-style:dashed;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:600;color:var(--text);}
.ex-name.highlight{color:var(--peach);}
.ex-detail{font-size:12px;color:var(--text2);margin-top:1px;}
.ex-cue{font-size:11px;color:var(--text3);margin-top:3px;font-style:italic;line-height:1.4;}
.ex-actual{align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap;}
.ex-actual input{width:58px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:5px 8px;color:var(--text);font-size:12px;font-family:'Nunito',sans-serif;outline:none;}
.ex-actual input:focus{border-color:var(--pink);}
.ex-actual input.wide{width:72px;}
.ex-actual .sep{font-size:11px;color:var(--text3);}
.ex-pr{font-size:10px;color:var(--peach);font-weight:700;padding:2px 7px;background:var(--peach-dim);border-radius:99px;}
.section-header{display:flex;align-items:center;gap:10px;margin:20px 0 12px;}
.section-line{flex:1;height:1px;background:var(--border);}
.section-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;}
.mode-pill{display:flex;gap:4px;margin-bottom:14px;background:var(--bg3);border-radius:99px;padding:3px;}
.mode-btn{flex:1;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);transition:all 0.15s;font-family:'Nunito',sans-serif;}
.mode-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 0 0 1px var(--border2);}
.prog-bar{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-top:10px;}
.prog-fill{height:100%;border-radius:99px;transition:width 0.4s ease;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.18s;border:none;font-family:'Nunito',sans-serif;letter-spacing:0.02em;}
.btn-primary{background:var(--pink);color:#1a0010;}
.btn-primary:hover{opacity:0.88;}
.btn-primary.done{background:var(--mint);color:#001a10;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{color:var(--text);background:var(--bg3);}
.btn-sm{padding:7px 14px;font-size:12px;}
input[type=text],input[type=number],select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;padding:10px 14px;width:100%;outline:none;transition:border 0.15s;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--pink);}
textarea{resize:vertical;min-height:72px;line-height:1.6;}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500;}
.form-row{margin-bottom:14px;}
.tabs{display:flex;gap:3px;background:var(--bg3);border-radius:99px;padding:3px;margin-bottom:20px;}
.tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;border-radius:99px;cursor:pointer;color:var(--text3);transition:all 0.15s;border:none;background:none;font-family:'Nunito',sans-serif;}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 0 0 1px var(--border2);}
.log-entry{border-bottom:1px solid var(--border);cursor:pointer;}
.log-entry:last-child{border-bottom:none;}
.log-item{display:flex;align-items:center;gap:12px;padding:11px 0;}
.log-chevron{color:var(--text3);flex-shrink:0;transition:transform 0.2s;}
.log-detail{padding:0 0 12px 21px;display:none;}
.log-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.log-date{font-size:11px;color:var(--text2);min-width:72px;}
.log-name{font-size:13px;font-weight:500;flex:1;}
.notes-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;min-height:72px;font-size:13px;color:var(--text);font-family:'Nunito',sans-serif;outline:none;width:100%;resize:none;transition:border 0.15s;line-height:1.6;}
.notes-box:focus{border-color:var(--pink);}
.pt-banner{background:rgba(240,152,152,0.06);border:1px solid rgba(240,152,152,0.18);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.pt-toggle{width:42px;height:24px;background:var(--bg3);border-radius:99px;border:1px solid var(--border2);cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
.pt-toggle.on{background:var(--mint);border-color:var(--mint);}
.pt-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:var(--text2);border-radius:50%;transition:all 0.2s;}
.pt-toggle.on::after{left:21px;background:#001a10;}
.milestone{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.milestone:last-child{border-bottom:none;}
.ms-check{width:20px;height:20px;border-radius:50%;border:1px solid var(--border3);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;}
.ms-check.checked{background:var(--lavender);border-color:var(--lavender);}
.ms-check.checked::after{content:'✦';font-size:9px;color:#0e0a2a;}
.ms-label{font-size:13px;color:var(--text);}
.ms-sub{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.filter-pill{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;border:1px solid var(--border2);color:var(--text3);cursor:pointer;transition:all 0.15s;font-family:'Nunito',sans-serif;background:none;}
.filter-pill.active{color:var(--text);border-color:var(--pink);background:var(--pink-dim);}
@keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.18);}100%{transform:scale(1);}}
.celebrate{animation:pop 0.4s ease;}
@keyframes float-star{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(0.4);}}
.float-star{position:fixed;font-size:18px;pointer-events:none;z-index:9999;animation:float-star 1s ease-out forwards;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
.empty{text-align:center;padding:28px 16px;color:var(--text3);font-size:13px;}
.chart-wrap{position:relative;width:100%;height:180px;margin-top:8px;}
.toast{position:fixed;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:99px;padding:10px 18px;font-size:12px;color:var(--text2);white-space:nowrap;z-index:300;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:700px){.toast{bottom:24px;}}
@media(max-width:699px){
  .ex-check{width:24px;height:24px;border-radius:7px;}
  .ms-check{width:24px;height:24px;}
  .btn{padding:13px 22px;font-size:14px;}
  .btn-sm{padding:10px 16px;font-size:13px;}
  .filter-pill{padding:8px 14px;font-size:12px;}
  .tab{padding:10px;}
  input[type=text],input[type=number],select,textarea{font-size:16px;}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app">
  <main class="main" id="main-content">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="page-header">
        <div class="page-title">Good <em id="dash-greeting">morning</em> ✦</div>
        <div class="page-sub" id="dash-date"></div>
      </div>
      <div id="today-banner-el"></div>
      <div class="stat-grid cols-2" id="dash-streak-grid"></div>
      <div class="stat-grid cols-2" id="dash-week-grid-stats"></div>
      <div class="card">
        <div class="card-title">This week</div>
        <div class="week-grid" id="dash-week-grid"></div>
        <div style="display:flex;gap:12px;margin-top:12px;font-size:10px;color:var(--text3);">
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--pink);display:inline-block;"></span>Workout</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--lavender);display:inline-block;"></span>Daily routine</span>
        </div>
      </div>
    </div>

    <!-- TODAY -->
    <div class="page" id="page-today">
      <div class="page-header">
        <div class="page-title" id="today-title">Today</div>
        <div class="page-sub" id="today-sub"></div>
      </div>
      <div id="today-content"></div>
    </div>

    <!-- DAILY ROUTINE -->
    <div class="page" id="page-daily">
      <div class="page-header">
        <div class="page-title">Daily <em>Routine</em></div>
        <div class="page-sub">Every day — wrists, shoulders, hollow body &amp; PT</div>
      </div>
      <div class="mode-pill">
        <button class="mode-btn active" id="wrist-min-btn" onclick="setWristMode('min')">Wrists min</button>
        <button class="mode-btn" id="wrist-full-btn" onclick="setWristMode('full')">Wrists full</button>
      </div>
      <div class="mode-pill">
        <button class="mode-btn active" id="pt-min-btn" onclick="setPtMode('min')">PT min</button>
        <button class="mode-btn" id="pt-full-btn" onclick="setPtMode('full')">PT full</button>
      </div>
      <div id="daily-content"></div>
      <div style="margin-top:16px;display:flex;align-items:center;gap:10px;">
        <button class="btn btn-sm" id="daily-log-btn" style="background:var(--lavender);color:#0e0a2a;" onclick="logDailyDone(false)">Mark daily done ✧</button>
      </div>
      <div class="prog-bar" style="margin-top:14px;"><div class="prog-fill" id="daily-prog-fill" style="width:0%;background:var(--lavender);"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-top:5px;" id="daily-prog-text"></div>
    </div>

    <!-- PROGRESS -->
    <div class="page" id="page-progress">
      <div class="page-header">
        <div class="page-title">Progress <em>✦</em></div>
        <div class="page-sub">Skills, lifts and goals</div>
      </div>
      <div id="progress-content"></div>
    </div>

    <!-- HISTORY (log + data) -->
    <div class="page" id="page-log">
      <div class="page-header">
        <div class="page-title">History <em>✦</em></div>
        <div class="page-sub">Workout log &amp; data backup</div>
      </div>
      <div class="filter-row" id="log-filters"></div>
      <div class="card" id="log-list"></div>
      <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:20px;">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;">Data backup</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" onclick="exportData()">Download backup</button>
          <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importData(event)">
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('import-file').click()">Import backup</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--rose);border-color:rgba(240,152,152,0.3);" id="clear-data-btn" onclick="clearAllData()">Clear all data</button>
        </div>
      </div>
    </div>

    <!-- WEEKLY PLAN -->
    <div class="page" id="page-weekly">
      <div class="page-header">
        <div class="page-title">Weekly <em>Plan</em></div>
        <div class="page-sub">Tap any day to see the full workout</div>
      </div>
      <div id="weekly-content"></div>
    </div>

  </main>

  <nav class="bottom-nav">
    <div class="bn-row">
      <button class="bn-item active" onclick="showPage('dashboard')">
        <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span class="bn-label">Home</span>
      </button>
      <button class="bn-item" onclick="showPage('daily')">
        <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span class="bn-label">Daily</span>
      </button>
      <button class="bn-item" onclick="showPage('today')">
        <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span class="bn-label">Today</span>
      </button>
      <button class="bn-item" onclick="showPage('weekly')">
        <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="bn-label">Plan</span>
      </button>
      <button class="bn-item" onclick="showPage('progress')">
        <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span class="bn-label">Progress</span>

function fmtDate(k){const d=new Date(k+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function greetingWord(){const h=new Date().getHours();if(h<12)return'morning';if(h<17)return'afternoon';return'evening';}
function calcWStreak(){let s=0;const t=today();for(let i=0;i<365;i++){const d=new Date(t);d.setDate(t.getDate()-i);if(state.workouts[dk(d)])s++;else if(i>0)break;}return s;}
function calcDStreak(){let s=0;const t=today();for(let i=0;i<365;i++){const d=new Date(t);d.setDate(t.getDate()-i);if(state.daily[dk(d)])s++;else if(i>0)break;}return s;}
function weekWorkouts(){const t=today();const ws=new Date(t);ws.setDate(t.getDate()-t.getDay());let c=0;for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);if(state.workouts[dk(d)])c++;}return c;}
function weekDaily(){const t=today();const ws=new Date(t);ws.setDate(t.getDate()-t.getDay());let c=0;for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);if(state.daily[dk(d)])c++;}return c;}
function getPR(exId){const e=state.gymPRs[exId]||[];if(!e.length)return null;return Math.max(...e.map(x=>+x.weight));}

function showToast(msg,dur=2800){
  const t=document.getElementById('toast');
  if(!t)return;t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function celebrate(el){
  if(!el)return;
  el.classList.remove('celebrate');void el.offsetWidth;el.classList.add('celebrate');
  for(let i=0;i<6;i++){
    const s=document.createElement('div');s.className='float-star';
    s.textContent=['✦','✧','·','◦'][Math.floor(Math.random()*4)];
    s.style.cssText=`left:${20+Math.random()*60}%;bottom:${80+Math.random()*40}px;color:${['var(--pink)','var(--lavender)','var(--peach)','var(--mint)'][Math.floor(Math.random()*4)]};animation-delay:${Math.random()*0.3}s;`;
    document.body.appendChild(s);setTimeout(()=>s.remove(),1200);
  }
}

// NAVIGATION
// ═══════════════════════════════════════════════
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll(`[onclick="showPage('${id}')"]`).forEach(el=>el.classList.add('active'));
  renderPage(id);
  document.getElementById('main-content').scrollTo(0,0);
}
function renderPage(id){
  if(id==='dashboard')renderDashboard();
  else if(id==='today')renderToday();
  else if(id==='daily')renderDailyPage();
  else if(id==='weekly')renderWeekly();
  else if(id==='progress')renderProgress();
  else if(id==='log')renderLog();
}

// ═══════════════════════════════════════════════
// EXERCISE RENDERING
// ═══════════════════════════════════════════════
function renderExItem(e,dayKey,readonly){
  const ck=`${dayKey}_${e.id}`;
  const isChecked=state.checks[ck]||false;
  const prVal=e.w?getPR(e.id):null;
  const actKey=`act_${dayKey}_${e.id}`;
  const actual=state.actual||{};
  const savedSets=actual[actKey]?.sets||'';
  const savedReps=actual[actKey]?.reps||'';
  const savedSecs=actual[actKey]?.secs||'';
  const savedW=actual[actKey]?.weight||(e.w?(state.gymPRs[e.id]?.slice(-1)[0]?.weight||''):'');
  const needsInput=(e.w||e.r||e.t)&&!readonly;
  return`<li class="ex-item">
    <div class="ex-check ${readonly?'readonly':''} ${isChecked?'checked':''}" ${!readonly?`onclick="toggleCheck('${ck}')"`:''}></div>
    <div class="ex-info">
      <div class="ex-name ${e.highlight?'highlight':''}">${e.name}</div>
      <div class="ex-detail">${e.detail}</div>
      ${e.cue?`<div class="ex-cue">${e.cue}</div>`:''}
      ${needsInput?`<div class="ex-actual" id="actual-${ck}" style="display:${isChecked?'flex':'none'};">
        <input type="number" placeholder="sets" min="1" value="${savedSets}" onchange="saveActual('${actKey}','sets',this.value)"/>
        <span class="sep">×</span>
        ${e.t
          ?`<input type="number" placeholder="sec" min="1" value="${savedSecs}" onchange="saveActual('${actKey}','secs',this.value)"/><span class="sep">sec</span>`
          :`<input type="number" placeholder="reps" min="1" value="${savedReps}" onchange="saveActual('${actKey}','reps',this.value)"/><span class="sep">reps</span>`
        }
        ${e.w?`<input type="number" class="wide" placeholder="lbs/kg" min="0" step="2.5" value="${savedW}" onchange="saveActual('${actKey}','weight',this.value);logWeight('${e.id}',this.value)"/>${prVal?`<span class="ex-pr">PR ${prVal}</span>`:''}`:``}
      </div>`:''}
    </div>
  </li>`;
}

function renderSection(arr,key,accentColor,label){
  return`<div style="margin-bottom:4px;">
    <div class="section-header">
      <div class="section-label" style="color:${accentColor||'var(--text3)'};">${label}</div>
      <div class="section-line"></div>
    </div>
    <div class="card"><ul class="ex-list">${arr.map(e=>renderExItem(e,key,false)).join('')}</ul></div>
  </div>`;
}

function toggleCheck(ck){
  state.checks[ck]=!state.checks[ck];save();
  const el=document.querySelector(`[onclick="toggleCheck('${ck}')"]`);
  if(el)el.classList.toggle('checked',state.checks[ck]);
  const aEl=document.getElementById(`actual-${ck}`);
  if(aEl)aEl.style.display=state.checks[ck]?'flex':'none';
  updateDailyProgress();
}

function saveActual(actKey,field,val){
  if(!state.actual)state.actual={};
  if(!state.actual[actKey])state.actual[actKey]={};
  state.actual[actKey][field]=val;save();
}

function logWeight(exId,val){
  if(!val)return;
  if(!state.gymPRs[exId])state.gymPRs[exId]=[];
  state.gymPRs[exId].push({date:todayKey(),weight:+val});save();
}

function restoreChecks(prefix){
  document.querySelectorAll(`[onclick^="toggleCheck('${prefix}"]`).forEach(el=>{
    const m=el.getAttribute('onclick').match(/'([^']+)'/);
    if(m&&state.checks[m[1]]){
      el.classList.add('checked');
      const aEl=document.getElementById(`actual-${m[1]}`);
      if(aEl)aEl.style.display='flex';
    }
  });
}

// DASHBOARD
// ═══════════════════════════════════════════════
function renderDashboard(){
  const now=new Date();const dow=now.getDay();const sc=SCHEDULE[dow];
  document.getElementById('dash-greeting').textContent=greetingWord();
  document.getElementById('dash-date').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const isDone=!!state.workouts[todayKey()];
  document.getElementById('today-banner-el').innerHTML=`
    <div class="today-banner">
      <div class="banner-day">${sc.name}</div>
      <div class="banner-type">${sc.type}</div>
      <button class="banner-btn" onclick="showPage('today')">${isDone?"✓ Done — view again":"Open today's workout →"}</button>
    </div>`;
  const ws=calcWStreak();const ds=calcDStreak();
  document.getElementById('dash-streak-grid').innerHTML=`
    <div class="stat"><div class="stat-val" style="color:var(--pink)">${ws}</div><div class="stat-label">Workout streak</div><div class="stat-sub">days in a row</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--lavender)">${ds}</div><div class="stat-label">Daily streak</div><div class="stat-sub">routine days</div></div>`;
  document.getElementById('dash-week-grid-stats').innerHTML=`
    <div class="stat"><div class="stat-val">${weekWorkouts()}<span style="font-size:14px;color:var(--text2)">/7</span></div><div class="stat-label">Workouts this week</div></div>
    <div class="stat"><div class="stat-val">${weekDaily()}<span style="font-size:14px;color:var(--text2)">/7</span></div><div class="stat-label">Daily routines</div></div>`;
  const t=today();const ws2=new Date(t);ws2.setDate(t.getDate()-t.getDay());
  const grid=document.getElementById('dash-week-grid');grid.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(ws2);d.setDate(ws2.getDate()+i);
    const key=dk(d);const isFuture=d>t;const isToday=d.getTime()===t.getTime();
    const wDone=!!state.workouts[key];const dDone=!!state.daily[key];
    const names=['Su','Mo','Tu','We','Th','Fr','Sa'];
    const sc2=SCHEDULE[d.getDay()];
    const col=document.createElement('div');col.className='day-col';
    col.innerHTML=`<div class="day-name">${names[d.getDay()]}</div>
      <div class="day-circle ${isFuture?'future':''} ${isToday?'today':''} ${wDone?'done':''}" style="position:relative;">
        ${d.getDate()}
        ${dDone&&!wDone?'<span style="position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:var(--lavender);display:block;"></span>':''}
      </div>
      <div class="day-tag" style="color:${sc2.color}">${sc2.short}</div>`;
    grid.appendChild(col);
  }
}

function renderToday(){
  const now=new Date();const dow=now.getDay();const sc=SCHEDULE[dow];const k=todayKey();
  document.getElementById('today-title').innerHTML=`<em style="color:var(--pink);font-style:italic;">${sc.name}</em> <span style="color:var(--text);font-style:normal;">✦</span>`;
  document.getElementById('today-sub').textContent=sc.type;
  const isDone=!!state.workouts[k];
  let html='';

  // Mon and Sat include their own log button, notes, and location toggle
  if(dow!==1&&dow!==6){
    html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn btn-primary ${isDone?'done':''}" id="workout-log-btn" onclick="toggleWorkoutDone()">
        ${isDone?'✓ Logged — tap to undo':'Mark workout done ✦'}
      </button>
    </div>`;
    html+=`<div class="card" style="margin-bottom:16px;">
      <div class="card-title">Session notes</div>
      <textarea class="notes-box" placeholder="How did it feel? Any wins, struggles..." onchange="saveNotes('${k}',this.value)">${state.workouts[k]?.notes||''}</textarea>
    </div>`;
  }

  if(dow===4){
    const attended=!!state.ptAttended[k];
    html+=`<div class="pt-banner"><div><div style="font-size:14px;font-weight:600;color:var(--rose);">PT Appointment</div><div style="font-size:12px;color:var(--text2);margin-top:2px;">Did you make it to your physical therapist today?</div></div><div class="pt-toggle ${attended?'on':''}" onclick="togglePT('${k}')"></div></div>`;
  }

  if(dow===1)html+=renderMonday(k);
  else if(dow===6)html+=renderSaturday(k);
  else if(dow===2)html+=renderTuesdayWorkout(k);
  else if(dow===3)html+=renderFlexWed(k);
  else if(dow===4)html+=renderThursday(k);
  else if(dow===5)html+=`<div class="card" style="text-align:center;padding:32px;"><div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--pink);">Aerial Hoop Open Gym</div><div style="font-size:13px;color:var(--text2);margin-top:6px;">Have fun — no structure needed today ✦</div></div>`;
  else if(dow===0)html+=renderFlexSun(k);

  document.getElementById('today-content').innerHTML=html;
  restoreChecks('today_'+k);
}

function renderDailyBlock(k){
  const dk2='daily_'+k;
  const wm=state.wristMode||'min';const pm=state.ptMode||'min';
  const sections=[
    {label:'Hollow body',color:'var(--lavender)',items:DAILY.hollow},
    {label:'Wrists'+(wm==='min'?' (min)':''),color:'var(--sky)',items:[...DAILY.wrist_min,...(wm==='full'?DAILY.wrist_extra:[])]},
    {label:'Shoulders',color:'var(--peach)',items:DAILY.shoulders},
    {label:'Knee PT'+(pm==='min'?' (min)':''),color:'var(--rose)',items:[...DAILY.pt_min,...(pm==='full'?DAILY.pt_extra:[])]},
  ];
  return sections.map(s=>`<div style="margin-bottom:8px;">
    <div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:${s.color};margin-bottom:6px;">${s.label}</div>
    <div class="card" style="padding:12px 14px;"><ul class="ex-list">${s.items.map(e=>renderExItem(e,dk2,false)).join('')}</ul></div>
  </div>`).join('');
}

function locationToggle(k,day){
  const loc=state.location[k]||'gym';
  return`<div class="mode-pill" style="margin-bottom:16px;">
    <button class="mode-btn ${loc==='gym'?'active':''}" onclick="setLoc('${k}','${day}','gym')">Gym</button>
    <button class="mode-btn ${loc==='home'?'active':''}" onclick="setLoc('${k}','${day}','home')">Home</button>
  </div>`;
}

function setLoc(k,day,loc){
  state.location[k]=loc;save();
  if(day==='mon')document.getElementById('today-content').innerHTML=buildMonday(k);
  else document.getElementById('today-content').innerHTML=buildSaturday(k);
  restoreChecks('today_'+k);
}

function buildMonday(k){
  const loc=state.location[k]||'gym';
  const key='today_'+k;
  const ex=loc==='gym'?MON:MON_HOME;
  const isDone=!!state.workouts[k];
  return locationToggle(k,'mon')
    +`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn btn-primary ${isDone?'done':''}" id="workout-log-btn" onclick="toggleWorkoutDone()">
        ${isDone?'✓ Logged — tap to undo':'Mark workout done ✦'}
      </button>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title">Session notes</div>
      <textarea class="notes-box" placeholder="How did it feel? Any wins, struggles..." onchange="saveNotes('${k}',this.value)">${state.workouts[k]?.notes||''}</textarea>
    </div>`
    +renderSection(ex.warmup,key,'var(--rose)','Warm-up / activation')
    +renderSection(ex.pull,key,'var(--sky)','Pull')
    +renderSection(ex.push,key,'var(--peach)','Push')
    +renderSection(ex.accessory,key,'var(--lavender)','Accessory')
    +(loc==='gym'?renderSection(ex.core,key,'var(--mint)','Core'):'');
}

function buildSaturday(k){
  const loc=state.location[k]||'gym';
  const key='today_'+k;
  const ex=loc==='gym'?SAT:SAT_HOME;
  const isDone=!!state.workouts[k];
  return locationToggle(k,'sat')
    +`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn btn-primary ${isDone?'done':''}" id="workout-log-btn" onclick="toggleWorkoutDone()">
        ${isDone?'✓ Logged — tap to undo':'Mark workout done ✦'}
      </button>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title">Session notes</div>
      <textarea class="notes-box" placeholder="How did it feel? Any wins, struggles..." onchange="saveNotes('${k}',this.value)">${state.workouts[k]?.notes||''}</textarea>
    </div>`
    +renderSection(ex.warmup,key,'var(--rose)','Warm-up / activation')
    +renderSection(ex.pull,key,'var(--sky)','Pull')
    +renderSection(ex.push,key,'var(--peach)','Push')
    +renderSection(ex.accessory,key,'var(--lavender)','Accessory')
    +(loc==='gym'?renderSection(ex.core,key,'var(--mint)','Core'):'');
}

function renderMonday(k){
  return buildMonday(k);
}

// WEEKLY PLAN
// ═══════════════════════════════════════════════
let expandedDay=null;

function renderWeekly(){
  const t=today();const order=[1,2,3,4,5,6,0];let html='';
  order.forEach(dow=>{
    const sc=SCHEDULE[dow];const isToday=t.getDay()===dow;const isExp=expandedDay===dow;
    html+=`<div style="margin-bottom:10px;">
      <div onclick="toggleDayExpand(${dow})" style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg2);border:1px solid ${isToday?sc.color+'55':'var(--border)'};border-radius:var(--r);cursor:pointer;${isExp?'border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom:none;':''}">
        <div>
          <div style="font-size:14px;font-weight:600;color:${isToday?sc.color:'var(--text)'};">${sc.name}${isToday?' <span style="font-size:10px;background:'+sc.color+'22;color:'+sc.color+';padding:2px 7px;border-radius:99px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;">Today</span>':''}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px;">${sc.type}</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3);transition:transform 0.2s;transform:${isExp?'rotate(90deg)':'rotate(0deg)'}"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      ${isExp?`<div style="background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:16px 18px;">
        ${renderDayPreview(dow)}
      </div>`:''}
    </div>`;
  });
  document.getElementById('weekly-content').innerHTML=html;
}

function toggleDayExpand(dow){expandedDay=expandedDay===dow?null:dow;renderWeekly();}

function renderDayPreview(dow){
  if(dow===1)return renderMonPreview();
  if(dow===6)return renderSatPreview();
  if(dow===2)return renderTuePreview();
  if(dow===3)return renderWedPreview();
  if(dow===4)return renderThuPreview();
  if(dow===5)return`<div style="text-align:center;padding:20px;color:var(--text2);font-size:13px;">Aerial hoop open gym ✦ No structure, just fly.</div>`;
  if(dow===0)return renderSunPreview();
  return'';
}

function previewSection(arr,accentColor,label){
  return`<div style="margin-bottom:12px;">
    <div style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:${accentColor};margin-bottom:8px;">${label}</div>
    <ul style="list-style:none;">${arr.map(e=>`<li style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
      <span style="font-weight:600;color:var(--text);">${e.name}</span>
      <span style="color:var(--text3);font-size:11px;margin-left:6px;">${e.detail}</span>
    </li>`).join('')}</ul>
  </div>`;
}

// END-OF-DAY AUTO-LOG
// ═══════════════════════════════════════════════
function hasCheckedExercises(){
  const k=todayKey();
  return Object.entries(state.checks).some(([ck,v])=>v&&ck.startsWith('today_'+k+'_'));
}

function autoLogFromChecks(){
  const k=todayKey();
  if(state.workouts[k])return;
  if(!hasCheckedExercises())return;
  // Build exercise list from stored checks + actuals
  const allEx=[
    ...MON.warmup,...MON.pull,...MON.push,...MON.accessory,...MON.core,
    ...MON_HOME.warmup,...MON_HOME.pull,...MON_HOME.push,...MON_HOME.accessory,
    ...SAT.warmup,...SAT.pull,...SAT.push,...SAT.accessory,...SAT.core,
    ...SAT_HOME.warmup,...SAT_HOME.pull,...SAT_HOME.push,...SAT_HOME.accessory,
    ...TUE.handstand,...TUE.hollow,...TUE.lateral,...TUE.compression,
    ...WED.warmup,...WED.shoulders,...WED.backbend_warmup,...WED.main_bridge,...WED.back_strength,...WED.variations,...WED.cooldown,
    ...THU.core,
    ...SUN.warmup,...SUN.right_split,...SUN.left_split,...SUN.middle_split,...SUN.shoulders_deep,...SUN.hips,...SUN.backbend_light,...SUN.cooldown,
    ...DAILY.pt_min,...DAILY.pt_extra,
  ];
  const checked=[];
  Object.entries(state.checks).forEach(([ck,v])=>{
    if(!v||!ck.startsWith('today_'+k+'_'))return;
    const exId=ck.replace('today_'+k+'_','');
    const ex=allEx.find(e=>e.id===exId);
    if(!ex)return;
    const actKey=`act_today_${k}_${exId}`;
    const actual=(state.actual||{})[actKey]||{};
    checked.push({name:ex.name,sets:actual.sets||'',reps:actual.reps||'',secs:actual.secs||'',weight:actual.weight||'',planned:ex.detail});
  });
  state.workouts[k]={ts:new Date().toISOString(),notes:'',exercises:checked,dow:new Date().getDay(),autoLogged:true};
  save();
  showToast('Workout auto-logged from checked exercises ✦',4000);
  if(document.getElementById('page-dashboard').classList.contains('active'))renderDashboard();
}

function scheduleAutoLog(){
  const now=new Date();
  const ninepm=new Date(now);ninepm.setHours(21,0,0,0);
  const midnight=new Date(now);midnight.setHours(23,59,50,0);
  if(now<ninepm)setTimeout(autoLogFromChecks,ninepm-now);
  if(now<midnight)setTimeout(autoLogFromChecks,midnight-now);
  // Check immediately if already past 9pm
  if(now.getHours()>=21)autoLogFromChecks();
}

function renderPRsTab(){
  // All weighted exercises across both push/pull days
  const allWeighted=[
    ...MON.pull,...MON.push,...MON.accessory,...MON.core,
    ...SAT.pull,...SAT.push,...SAT.accessory,...SAT.core,
    ...TUE.hollow,
  ].filter(e=>e.w);
  // Deduplicate by id
  const seen=new Set();
  const unique=allWeighted.filter(e=>{if(seen.has(e.id))return false;seen.add(e.id);return true;});

  const rows=unique.map(e=>{
    const entries=state.gymPRs[e.id]||[];
    const pr=entries.length?Math.max(...entries.map(x=>+x.weight)):null;
    const last=entries.length?entries[entries.length-1]:null;
    return{e,pr,last};
  });

  const withPR=rows.filter(r=>r.pr!==null).sort((a,b)=>b.pr-a.pr);
  const withoutPR=rows.filter(r=>r.pr===null);

  const rowHtml=({e,pr,last})=>`
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);">

      </div>
      ${pr!==null?`<div style="text-align:right;flex-shrink:0;">
        <div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--peach);">${pr}</div>
        <div style="font-size:10px;color:var(--text3);">lbs/kg</div>
      </div>`:`<div style="font-size:11px;color:var(--text3);">—</div>`}
    </div>`;

  return`<div class="card">
    <div class="card-title">Personal records — weighted exercises</div>
    ${withPR.length?withPR.map(rowHtml).join(''):''}
    ${withoutPR.length?`
      <div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin:14px 0 8px;">Not yet logged</div>
      ${withoutPR.map(rowHtml).join('')}
    `:''}
    ${!withPR.length&&!withoutPR.length?`<div class="empty">No weighted exercises found</div>`:''}
  </div>`;
}

// ═══════════════════════════════════════════════
function autoBackup(){
  try{
    const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),data:state},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='exercise-data.json';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  }catch(err){console.warn('Auto-backup failed',err);}
}

function exportData(){
  const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),data:state},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='exercise-data.json';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  showToast('Data exported ✦');
}

function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const imported=parsed.data||parsed;
      state={
        workouts:{},daily:{},checks:{},ptAttended:{},
        progress:{bridge:[],splits:[],handstand:[],hollow:[]},
        milestones:{handstand:{},bridge:{}},gymPRs:{},actual:{},
        wristMode:'min',ptMode:'min',
        ...imported,
        progress:{bridge:[],splits:[],handstand:[],hollow:[],...(imported.progress||{})},
        milestones:{handstand:{},bridge:{},...(imported.milestones||{})},
      };
      if(!state.actual)state.actual={};
      save();showToast('Data imported ✦');showPage('dashboard');
    }catch(err){showToast('Import failed — invalid file');}
  };
  reader.readAsText(file);event.target.value='';
}

function clearAllData(){
  const btn=document.querySelector('[onclick="clearAllData()"]');
  if(!btn)return;
  if(btn.dataset.confirming==='true'){
    localStorage.removeItem('train_sakura');
    location.reload();
  } else {
    btn.dataset.confirming='true';
    btn.textContent='Tap again to confirm';
    setTimeout(()=>{btn.dataset.confirming='';btn.textContent='Clear all data';},3000);
  }
}

// ═══════════════════════════════════════════════
// STARS + INIT
// ═══════════════════════════════════════════════
function initStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<30;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
}

initStars();
renderDashboard();
scheduleAutoLog();
</script>
